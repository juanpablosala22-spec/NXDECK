name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: Digreatbrian/buildozer-action@v2
        with:
          buildozer_version: stable
          command: buildozer android debug
